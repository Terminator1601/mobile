name: event_discovery
description: A location-based social event discovery app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  dio: ^5.4.1
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  share_plus: ^10.1.4
  web_socket_channel: ^3.0.2
  shimmer: ^3.0.0
  flutter_map_marker_cluster: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
